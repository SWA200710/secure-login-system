<!DOCTYPE html>
<html>
<head>
    <title>Register Page</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
            background-color: #f2f2f2;
        }

        input {
            padding: 10px;
            margin: 8px;
            width: 220px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 15px;
        }

        form {
            background: white;
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>

</head>

<body>

<h2>Register Page</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>
<br>

<input type="password" name="password" placeholder="Password" required>
<br>

<button type="submit">Register</button>

</form>

<a href="/login">Back to Login</a>

</body>
</html>
